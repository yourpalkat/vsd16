input CreateStoreInput {
  title: String!
  videoStoreFields: VideoStoreContent!
}

input VideoStoreContent {
  storeName: String
  contact: String
  email: String
  website: String
  phone: String
  streetAddress: String
  city: String
  stateprovince: String
  country: String
  instagram: String
  facebook: String
  rent: Boolean
  sales: Boolean
  videoStoreDayParticipant: Boolean
}
